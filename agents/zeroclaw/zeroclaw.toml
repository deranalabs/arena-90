schema_version = 3
locale = "en"

[agents.isagi]
enabled = true
model_provider = "custom.arena90_local"
risk_profile = "arena90_isagi"
runtime_profile = "arena90_clash"
skill_bundles = ["arena90_tools"]

[agents.isagi.identity]
format = "aieos"
aieos_inline = '''
{
  "name": "ISAGI",
  "role": "Arena90 attacking analyst",
  "system_prompt": "You are ISAGI, an aggressive soccer tactician. Read TxODDS match data through the read_odds tool, prioritize attacking momentum, price pressure, and open-game signals, and return a strict JSON decision. When the market indicates enough non-draw pressure, take Over 2.5 goals with concise rationale. Never invent live data outside the supplied mock."
}
'''

[agents.aiku]
enabled = true
model_provider = "custom.arena90_local"
risk_profile = "arena90_aiku"
runtime_profile = "arena90_clash"
skill_bundles = ["arena90_tools"]

[agents.aiku.identity]
format = "aieos"
aieos_inline = '''
{
  "name": "AIKU",
  "role": "Arena90 defensive analyst",
  "system_prompt": "You are AIKU, a disciplined defensive soccer tactician. Read TxODDS match data through the read_odds tool, prioritize draw resistance, market balance, defensive probability, and downside control, and return a strict JSON decision. When the match profile is balanced or draw-heavy, take Under 2.5 goals with concise rationale. Never invent live data outside the supplied mock."
}
'''

[providers.models.custom.arena90_local]
api_key = "arena90-local-runtime-token"
model = "arena90-local"
uri = "http://127.0.0.1:18090/v1/chat/completions"
wire_api = "chat_completions"
temperature = 0.0
timeout_secs = 30
max_tokens = 600

[risk_profiles.arena90_isagi]
level = "supervised"
allowed_commands = ["python3", "cat", "echo", "pwd"]
allowed_roots = [
  "/Users/derana/CodeDerana/arena-90/agents/zeroclaw",
  "/Users/derana/CodeDerana/arena-90/backend/solana-actions/mock",
]
workspace_only = false
require_approval_for_medium_risk = false
block_high_risk_commands = true

[risk_profiles.arena90_aiku]
level = "supervised"
allowed_commands = ["python3", "cat", "echo", "pwd"]
allowed_roots = [
  "/Users/derana/CodeDerana/arena-90/agents/zeroclaw",
  "/Users/derana/CodeDerana/arena-90/backend/solana-actions/mock",
]
workspace_only = false
require_approval_for_medium_risk = false
block_high_risk_commands = true

[runtime_profiles.arena90_clash]
agentic = false
max_tool_iterations = 1
max_history_messages = 4
max_context_tokens = 4096
max_tool_result_chars = 12000
max_system_prompt_chars = 12000
max_cost_per_day_cents = 100
parallel_tools = false
shell_timeout_secs = 30

[skill_bundles.arena90_tools]
directory = "tools"
include = ["read_odds"]
